<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<title>Typing Speed Test Game | Flame Wing </title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="wrapper">
    <p class="test-description">
    This typing test is the same except for three pairs of keys are flipped:  
    the "A" and "S" keys, the "R" and "E" keys, and the "I" and "O" keys.  
    Compare your results from Test 1 to Test 2.
    </p>
    <br>

<input type="text" class="input-field">
<div class="content-box">
<div class="typing-text">
<p></p>
</div>
<div class="content">
<ul class="result-details">
<li class="time">
<p>Time Left:</p>
<span><b>60</b>s</span>
</li>
<li class="accuracy">
<p>Accuracy:</p>
<span>100%</span>
</li>
<li class="wpm">
<p>WPM:</p>
<span>0</span>
</li>
<li class="cpm">
<p>CPM:</p>
<span>0</span>
</li>
</ul>
<button>Try Again</button>
</div>
</div>
</div>
<div class="return-home">
<button onclick="location.href='index.html'">Return to Home Page</button>
</div>
<script src="js/paragraphs.js"></script>
<script src="js/script2.js"></script>
</body>
</html>
